<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Callber P2P Debug</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .id-box { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin: 20px 0; color: #32D74B; font-size: 24px; font-family: monospace; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #2c2c2e; color: #fff; margin-bottom: 10px; font-size: 18px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-call { background: #32D74B; color: #fff; }
        #log { font-size: 10px; color: #8e8e93; text-align: left; margin-top: 20px; height: 100px; overflow-y: auto; background: #111; padding: 10px; }
    </style>
</head>
<body>
    <h2>CALLBER P2P TEST</h2>
    <div class="id-box" id="my-id">ЗАГРУЗКА...</div>
    <input type="text" id="peer-id" placeholder="ID партнера">
    <button class="btn btn-call" onclick="makeCall()">ПОЗВОНИТЬ</button>
    <div id="log">Логи системы:<br></div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        function log(msg) {
            document.getElementById('log').innerHTML += "> " + msg + "<br>";
            console.log(msg);
        }

        // Конфигурация с серверами Google для пробивки блокировок
        const peer = new Peer({
            config: {'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]}
        });

        peer.on('open', (id) => {
            const shortId = id.substring(0, 5).toUpperCase();
            document.getElementById('my-id').innerText = shortId;
            log("ID получен: " + shortId);
        });

        peer.on('error', (err) => log("ОШИБКА: " + err.type));

        // Прием звонка
        peer.on('call', (call) => {
            log("Входящий звонок...");
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                call.answer(stream);
                log("Ответил на звонок");
                handleCall(call);
            }).catch(e => log("Нет доступа к микрофону: " + e));
        });

        function makeCall() {
            const destId = document.getElementById('peer-id').value.toLowerCase();
            log("Звоню на: " + destId);
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                const call = peer.call(destId, stream);
                handleCall(call);
            }).catch(e => log("Ошибка микрофона: " + e));
        }

        function handleCall(call) {
            call.on('stream', (remoteStream) => {
                log("ПОТОК ПОЛУЧЕН! Слушайте звук");
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
            call.on('close', () => log("Звонок завершен"));
        }
    </script>
</body>
</html>
