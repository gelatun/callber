<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Callber P2P Pro Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .id-box { background: #1c1c1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin: 20px 0; color: #32D74B; font-size: 28px; font-weight: bold; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #2c2c2e; color: #fff; margin-bottom: 10px; font-size: 18px; text-align: center; }
        .btn-call { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #32D74B; color: #fff; font-weight: bold; font-size: 18px; }
        #log { font-size: 11px; color: #8e8e93; text-align: left; margin-top: 20px; height: 150px; overflow-y: auto; background: #111; padding: 15px; border-radius: 10px; border: 0.5px solid #333; line-height: 1.4; }
    </style>
</head>
<body>
    <h2 style="letter-spacing:-1px">CALLBER <span style="color:#0A84FF">P2P</span></h2>
    <div class="id-box" id="my-id">...</div>
    <input type="text" id="peer-id" placeholder="ID партнера">
    <button class="btn-call" onclick="makeCall()">УСТАНОВИТЬ СВЯЗЬ</button>
    <div id="log">Системный монитор:<br></div>
    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        const log = (msg) => {
            const l = document.getElementById('log');
            l.innerHTML += > ${msg}<br>;
            l.scrollTop = l.scrollHeight;
        };

        // Используем мощный список серверов для обхода NAT и блокировок
        const peer = new Peer({
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' },
                    { url: 'stun:stun2.l.google.com:19302' },
                    { url: 'stun:stun3.l.google.com:19302' },
                    { url: 'stun:stun4.l.google.com:19302' },
                    // Дополнительный сервер для сложных сетей
                    { url: 'stun:stun.ekiga.net' }
                ],
                'sdpSemantics': 'unified-plan'
            }
        });

        peer.on('open', (id) => {
            const shortId = id.substring(0, 5).toUpperCase();
            document.getElementById('my-id').innerText = shortId;
            log("Сеть Callber активна. Ваш ID: " + shortId);
        });

        peer.on('error', (err) => {
            log("<span style='color:#FF453A'>Ошибка: " + err.type + "</span>");
            if(err.type === 'network') log("Совет: попробуйте сменить Wi-Fi на LTE или наоборот");
        });

        peer.on('call', (call) => {
            log("Входящий P2P запрос...");
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                call.answer(stream);
                log("Соединение подтверждено");
                handleCall(call);
            }).catch(e => log("Ошибка доступа к микрофону"));
        });

        function makeCall() {
            const destId = document.getElementById('peer-id').value.toLowerCase();
            if(!destId) return log("Введите ID!");
            log("Попытка пробивки канала к " + destId + "...");
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                const call = peer.call(destId, stream);
                handleCall(call);
            }).catch(e => log("Микрофон не активен"));
        }

        function handleCall(call) {
            call.on('stream', (remoteStream) => {
log("<span style='color:#32D74B; font-weight:bold;'>КАНАЛ ПРОБИТ! Звук активен</span>");
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
            
            // Если через 10 секунд нет потока, даем совет
            setTimeout(() => {
                if (!document.getElementById('remote-audio').srcObject) {
                    log("Слишком сильная блокировка. Ищем обходной путь...");
                }
            }, 10000);
        }
    </script>
</body>
</html>
