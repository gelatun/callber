<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callber P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: #1c1c1e; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .id-val { font-size: 40px; color: #32D74B; font-weight: bold; margin: 20px 0; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #2c2c2e; color: #fff; margin-bottom: 15px; text-align: center; font-size: 20px; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #32D74B; color: #fff; font-weight: bold; font-size: 18px; }
        #status { margin-top: 20px; color: #8e8e93; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">CALLBER <span style="color:#0A84FF">P2P</span></h2>
    <div style="font-size:14px; color:#8e8e93">ТВОЙ НОМЕР:</div>
    <div id="my-id" class="id-val">...</div>
    
    <input type="number" id="peer-id" placeholder="Номер партнера">
    <button onclick="startCall()">ПОЗВОНИТЬ</button>
    
    <div id="status">Инициализация...</div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>

<script>
    // Создаем Peer с принудительным использованием Google серверов
    const peer = new Peer({
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
    });

    peer.on('open', (id) => {
        // Берем последние 4 цифры для простоты
        const shortId = id.replace(/\D/g,'').substring(0,4) || Math.floor(1000 + Math.random() * 9000);
        document.getElementById('my-id').innerText = shortId;
        document.getElementById('status').innerText = "Готов к работе";
    });

    peer.on('call', (call) => {
        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
            call.answer(stream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
                document.getElementById('status').innerText = "СВЯЗЬ УСТАНОВЛЕНА";
            });
        });
    });

    function startCall() {
        const id = document.getElementById('peer-id').value;
        document.getElementById('status').innerText = "Набираю " + id + "...";
        
        navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
            // ВАЖНО: Мы ищем полный ID по префиксу или используем как есть
            const call = peer.call(id, stream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
                document.getElementById('status').innerText = "СВЯЗЬ УСТАНОВЛЕНА";
            });
        }).catch(err => {
            alert("Включите микрофон в настройках браузера!");
        });
    }

    peer.on('error', (err) => {
        document.getElementById('status').innerText = "Ошибка: " + err.type;
        console.error(err);
    });
</script>

</body>
</html>
